<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comfy Hub</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS Files -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/views.css">
    <link rel="stylesheet" href="css/player.css">
    <link rel="stylesheet" href="css/settings.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/context-menu.css">
    <link rel="stylesheet" href="css/editor.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                <h1>Comfy Hub</h1>
            </div>
            <button class="settings-btn" id="openSettings">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
                Settings
            </button>
        </header>

        <main>
            <div id="loader" class="loader-container">
                <div class="spinner"></div>
            </div>

            <div class="view active" id="homeView">
                <div class="section-header">
                    <h2>Browse :</h2>
                </div>
                <div id="videoGrid" class="video-grid"></div>
            </div>

            <div class="view" id="playerView">
                <button class="back-btn" id="backBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                    Back to browse
                </button>
                
                <div class="player-layout">
                    <div class="player-main">
                        <div class="video-wrapper" id="videoIframeWrapper"></div>
                        
                        <div class="video-info">
                            <h2 id="videoTitle" class="video-title"></h2>
                            <div class="video-meta">
                                <span id="videoAuthor" class="author"></span>
                                <span class="dot-separator">•</span>
                                <span id="videoDate" class="date"></span>
                            </div>
                            <p id="videoDescription" class="video-desc"></p>
                        </div>
                    </div>
                    
                    <div class="player-sidebar">
                        <div class="sidebar-panel">
                            <div class="sidebar-header">
                                <h3>Episodes</h3>
                                <div class="season-selector">
                                    <select id="seasonSelect"></select>
                                </div>
                            </div>
                            <div class="search-box">
                                <input type="text" id="episodeSearch" placeholder="Search episodes...">
                            </div>
                            <div class="episode-list" id="episodeList"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Settings Modal -->
    <div class="settings-overlay" id="settingsOverlay">
        <div class="settings-modal">
            <div class="settings-header">
                <h2>Settings</h2>
                <button class="close-settings" id="closeSettings">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="settings-body">
                <div class="settings-tabs">
                    <button class="settings-tab active" data-section="general">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                        </svg>
                        General
                    </button>
                    <button class="settings-tab" data-section="data">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                            <polyline points="10 9 9 9 8 9"></polyline>
                        </svg>
                        Data Source
                    </button>
                </div>
                <div class="settings-content">
                    <!-- General Section -->
                    <div class="settings-section active" id="general">
                        <h3>General Settings</h3>
                        <div class="checkbox-group">
                            <input type="checkbox" id="autoPlay">
                            <span>Auto-play videos</span>
                        </div>
                        <div class="checkbox-group">
                            <input type="checkbox" id="showDescriptions" checked>
                            <span>Show video descriptions</span>
                        </div>
                        <div class="checkbox-group">
                            <input type="checkbox" id="darkMode" checked disabled>
                            <span>Dark mode (default)</span>
                        </div>
                        <button class="save-btn" id="openEditorBtn" style="margin-top: 20px; background: #6366f1;">Open JSON Editor</button>
                    </div>

                    <!-- Data Source Section -->
                    <div class="settings-section" id="data">
                        <h3>Data Source</h3>
                        
                        <div class="form-group">
                            <label>Select Data Sources</label>
                            <div class="data-sources-container">
                                <div class="data-source-item">
                                    <input type="checkbox" id="source-music" value="music">
                                    <label for="source-music">Music</label>
                                </div>
                                <div class="data-source-item">
                                    <input type="checkbox" id="source-anime" value="anime">
                                    <label for="source-anime">Anime</label>
                                </div>
                                <div class="data-source-item">
                                    <input type="checkbox" id="source-movies" value="movies">
                                    <label for="source-movies">Movies</label>
                                </div>
                                <div class="data-source-item">
                                    <input type="checkbox" id="source-mix" value="mix">
                                    <label for="source-mix">Mix (All)</label>
                                </div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Custom JSON URL</label>
                            <div class="custom-url-input">
                                <input type="url" id="customJsonUrl" placeholder="https://example.com/videos.json">
                                <button class="add-custom-btn" id="addCustomBtn">Add</button>
                            </div>
                            <small>Add custom JSON URLs to mix with selected presets</small>
                            <div class="custom-urls-list" id="customUrlsList"></div>
                        </div>

                        <button class="save-btn" id="saveSettings">Save Settings</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- JSON Editor Modal -->
    <div class="editor-overlay" id="editorOverlay">
        <div class="editor-modal">
            <div class="editor-header">
                <h2>JSON Editor</h2>
                <button class="close-editor" id="closeEditor">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="editor-body">
                <div class="editor-list">
                    <button class="add-video-btn" id="addVideoBtn">+ Add Video</button>
                    <div id="videosList"></div>
                </div>
                <div class="editor-content" id="editorContent">
                    <div class="no-video-selected">Select a video to edit</div>
                </div>
            </div>
            <div class="editor-actions">
                <button class="save-json-btn" id="saveJsonBtn">Save JSON</button>
                <button class="cancel-editor-btn" id="cancelEditorBtn">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Custom Context Menu -->
    <div class="context-menu" id="contextMenu">
        <div class="context-menu-item" data-action="copy-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
            </svg>
            Copy Link
        </div>
        <div class="context-menu-item" data-action="open-new-tab">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                <polyline points="15 3 21 3 21 9"></polyline>
                <line x1="10" y1="14" x2="21" y2="3"></line>
            </svg>
            Open in New Tab
        </div>
        <div class="context-menu-divider"></div>
        <div class="context-menu-item" data-action="reload">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="23 4 23 10 17 10"></polyline>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
            </svg>
            Reload Page
        </div>
    </div>

    <!-- JavaScript Files -->
    <script src="js/app.js"></script>
    <script src="js/editor.js"></script>
</body>
</html>
